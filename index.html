<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời Xin Lỗi Từ Trái Tim</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Lời Xin Lỗi</h1>
            <div class="buttons">
                <button class="apology-btn" data-part="1">Xin lỗi về những lời nói vô tâm</button>
                <button class="apology-btn" data-part="2">Xin lỗi vì đã làm na tổn thương</button>
                <button class="apology-btn" data-part="3">Xin lỗi vì không lắng nghe na</button>
                <button class="apology-btn" data-part="4">Xin lỗi và hứa sẽ thay đổi</button>
            </div>
            <div class="letter" id="letterContent">
                <!-- Nội dung sẽ được thêm vào đây qua JS -->
            </div>
        </div>
    </div>
    <div class="hearts">
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
        <div class="heart"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
